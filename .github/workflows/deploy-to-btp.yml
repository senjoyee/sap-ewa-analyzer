# =============================================================================
# SAP BTP Cloud Foundry Deployment Pipeline
# =============================================================================
# This workflow builds and deploys the EWA Analyzer to SAP BTP Cloud Foundry.
#
# Triggers:
# - Push to 'btp' or 'main' branch
# - Manual trigger via workflow_dispatch
#
# Required Secrets:
# - CF_API_ENDPOINT: Cloud Foundry API URL (e.g., https://api.cf.eu10.hana.ondemand.com)
# - CF_USERNAME: SAP BTP user email
# - CF_PASSWORD: SAP BTP password (or use CF_API_TOKEN for SSO)
# - CF_ORG: Cloud Foundry organization name
# - CF_SPACE: Cloud Foundry space name (e.g., dev, prod)
#
# Optional Secrets (for first-time setup):
# - AZURE_STORAGE_CONNECTION_STRING: For creating user-provided service
# - AZURE_OPENAI_API_KEY: For creating user-provided service
# =============================================================================

name: Deploy to SAP BTP

on:
  push:
    branches:
      - btp
      - main
  workflow_dispatch:
    inputs:
      space:
        description: 'Target CF Space (dev/test/prod)'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - test
          - prod
      skip_build:
        description: 'Skip build (use cached archive)'
        required: false
        default: false
        type: boolean

env:
  MBT_VERSION: "1.2.27"
  CF_CLI_VERSION: "8"

jobs:
  # ===========================================================================
  # Build Job - Creates MTA archive
  # ===========================================================================
  build:
    name: Build MTA Archive
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_build != 'true' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            sapui5/package-lock.json
            approuter/package-lock.json

      - name: Install MTA Build Tool
        run: npm install -g mbt@${{ env.MBT_VERSION }}

      - name: Validate MTA descriptor
        run: mbt validate

      - name: Build MTA archive
        run: mbt build -p=cf

      - name: Upload MTA archive
        uses: actions/upload-artifact@v4
        with:
          name: mta-archive
          path: mta_archives/*.mtar
          retention-days: 7

  # ===========================================================================
  # Deploy Job - Deploys to Cloud Foundry
  # ===========================================================================
  deploy:
    name: Deploy to Cloud Foundry
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && (needs.build.result == 'success' || github.event.inputs.skip_build == 'true')
    environment:
      name: ${{ github.event.inputs.space || 'dev' }}
      url: ${{ steps.get-url.outputs.app_url }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download MTA archive
        if: ${{ github.event.inputs.skip_build != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: mta-archive
          path: mta_archives

      - name: Install Cloud Foundry CLI
        run: |
          wget -q -O - https://packages.cloudfoundry.org/debian/cli.cloudfoundry.org.key | sudo apt-key add -
          echo "deb https://packages.cloudfoundry.org/debian stable main" | sudo tee /etc/apt/sources.list.d/cloudfoundry-cli.list
          sudo apt-get update
          sudo apt-get install cf8-cli

      - name: Install CF MTA plugin
        run: |
          cf install-plugin multiapps -f

      - name: Login to Cloud Foundry
        run: |
          cf login \
            -a ${{ secrets.CF_API_ENDPOINT }} \
            -u ${{ secrets.CF_USERNAME }} \
            -p ${{ secrets.CF_PASSWORD }} \
            -o ${{ secrets.CF_ORG }} \
            -s ${{ github.event.inputs.space || secrets.CF_SPACE || 'dev' }}

      - name: Check/Create Azure credentials service
        run: |
          if ! cf service ewa-analyzer-azure-credentials > /dev/null 2>&1; then
            echo "Creating Azure credentials service..."
            # Note: For production, secrets should be set via BTP Cockpit
            # This is a fallback for automated deployments
            if [ -n "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}" ]; then
              cf cups ewa-analyzer-azure-credentials -p '{
                "AZURE_STORAGE_CONNECTION_STRING": "${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}",
                "AZURE_STORAGE_CONTAINER_NAME": "${{ secrets.AZURE_STORAGE_CONTAINER_NAME }}",
                "AZURE_OPENAI_API_KEY": "${{ secrets.AZURE_OPENAI_API_KEY }}",
                "AZURE_OPENAI_ENDPOINT": "${{ secrets.AZURE_OPENAI_ENDPOINT }}",
                "AZURE_OPENAI_API_VERSION": "${{ secrets.AZURE_OPENAI_API_VERSION }}",
                "AZURE_OPENAI_SUMMARY_MODEL": "${{ secrets.AZURE_OPENAI_SUMMARY_MODEL }}"
              }'
            else
              echo "Warning: Azure credentials service not found and secrets not configured."
              echo "Please create the service manually in BTP Cockpit."
            fi
          else
            echo "Azure credentials service already exists."
          fi

      - name: Deploy MTA archive
        run: |
          MTA_FILE=$(find mta_archives -name "*.mtar" | head -1)
          echo "Deploying: $MTA_FILE"
          cf deploy "$MTA_FILE" --retries 1

      - name: Get application URL
        id: get-url
        run: |
          APP_URL=$(cf app ewa-analyzer-approuter | grep "routes:" | awk '{print $2}')
          echo "app_url=https://$APP_URL" >> $GITHUB_OUTPUT
          echo "Application deployed to: https://$APP_URL"

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Space | ${{ github.event.inputs.space || secrets.CF_SPACE || 'dev' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| URL | ${{ steps.get-url.outputs.app_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed Applications" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cf apps | grep ewa-analyzer >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Smoke Test Job - Verifies deployment
  # ===========================================================================
  smoke-test:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: [deploy]
    if: success()
    
    steps:
      - name: Wait for app startup
        run: sleep 30

      - name: Health check
        run: |
          APP_URL="${{ needs.deploy.outputs.app_url }}"
          echo "Testing health endpoint: $APP_URL/health"
          
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/health" || echo "000")
          
          if [ "$RESPONSE" = "200" ]; then
            echo "Health check passed!"
          else
            echo "Health check failed with status: $RESPONSE"
            exit 1
          fi
